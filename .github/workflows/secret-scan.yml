name: secret-scan

on:
  pull_request:
  push:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan git history
        run: bash scripts/check_secrets.sh --all-history

      - name: Scan working tree
        run: bash scripts/check_secrets.sh --working-tree
