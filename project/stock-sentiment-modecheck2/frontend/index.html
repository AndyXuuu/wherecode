<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Sentiment Console</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #ffffff;
        --ink: #1f2937;
        --accent: #0f766e;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Noto Sans", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top right, #dff6f0, var(--bg));
      }
      main {
        max-width: 860px;
        margin: 24px auto;
        background: var(--panel);
        border-radius: 14px;
        box-shadow: 0 12px 36px rgba(15, 118, 110, 0.14);
        padding: 24px;
      }
      textarea {
        width: 100%;
        min-height: 120px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        padding: 10px;
        font-size: 14px;
      }
      button {
        margin-top: 10px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }
      pre {
        background: #111827;
        color: #d1fae5;
        border-radius: 8px;
        padding: 12px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Stock Sentiment Console (No External Model Dependency)</h1>
      <p>This subproject runs fully local with deterministic keyword rules.</p>
      <textarea id="input">Nvidia reports strong chip demand with record growth.</textarea>
      <br />
      <button id="analyze">Analyze</button>
      <pre id="output">{}</pre>
    </main>

    <script>
      const analyzeButton = document.getElementById("analyze");
      const output = document.getElementById("output");
      const input = document.getElementById("input");

      analyzeButton.addEventListener("click", async () => {
        output.textContent = "loading...";
        try {
          const resp = await fetch("http://127.0.0.1:18080/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: input.value }),
          });
          const data = await resp.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          output.textContent = String(err);
        }
      });
    </script>
  </body>
</html>
